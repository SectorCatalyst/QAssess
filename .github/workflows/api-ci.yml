name: API CI

on:
  push:
    paths:
      - 'apps/api/**'
      - 'specs/api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'specs/api/**'
      - '.github/workflows/api-ci.yml'

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: qassess_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d qassess_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/qassess_ci
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      ACCESS_TOKEN_TTL_MINUTES: '15'
      REFRESH_TOKEN_TTL_DAYS: '30'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security scan (prod dependencies)
        run: npm audit --omit=dev --audit-level=high

      - name: Run DB migrations
        run: npm run db:migrate

      - name: Type check
        run: npm run check

      - name: Integration and E2E tests
        run: npm test

      - name: Build
        run: npm run build
