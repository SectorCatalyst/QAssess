services:
  - type: web
    name: qassess-api
    runtime: node
    plan: starter
    rootDir: apps/api
    buildCommand: npm ci && npm run build
    preDeployCommand: npm run db:migrate:runtime
    startCommand: npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: qassess-db
          property: connectionString
      - fromGroup: qassess-shared-secrets
      - key: CORS_ALLOWED_ORIGINS
        value: '*'
      - key: STRICT_SECRET_VALIDATION
        value: 'true'
      - key: ACCESS_TOKEN_TTL_MINUTES
        value: '15'
      - key: REFRESH_TOKEN_TTL_DAYS
        value: '30'
      - key: PUBLIC_BOOTSTRAP_RATE_LIMIT_PER_MINUTE
        value: '120'
      - key: PUBLIC_SESSION_START_RATE_LIMIT_PER_MINUTE
        value: '60'
      - key: PUBLIC_SESSION_MUTATION_RATE_LIMIT_PER_MINUTE
        value: '180'

  - type: worker
    name: qassess-pdf-worker
    runtime: node
    plan: starter
    rootDir: apps/api
    buildCommand: npm ci && npm run build
    startCommand: npm run start:worker:pdf
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: qassess-db
          property: connectionString
      - fromGroup: qassess-shared-secrets
      - key: STRICT_SECRET_VALIDATION
        value: 'true'
      - key: PDF_WORKER_BATCH_SIZE
        value: '25'

  - type: worker
    name: qassess-webhook-worker
    runtime: node
    plan: starter
    rootDir: apps/api
    buildCommand: npm ci && npm run build
    startCommand: npm run start:worker:webhook
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: qassess-db
          property: connectionString
      - fromGroup: qassess-shared-secrets
      - key: STRICT_SECRET_VALIDATION
        value: 'true'
      - key: WEBHOOK_WORKER_BATCH_SIZE
        value: '50'
      - key: WEBHOOK_WORKER_MAX_ATTEMPTS
        value: '6'

  - type: static
    name: qassess-web
    plan: free
    rootDir: apps/web
    buildCommand: npm ci && npm run build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: qassess-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: qassess-db
    plan: free
    databaseName: qassess
    user: qassess

envVarGroups:
  - name: qassess-shared-secrets
    envVars:
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: WEBHOOK_SECRET_ENCRYPTION_KEY
        sync: false
